services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      MODEL_ADAPTER: "${MODEL_ADAPTER:-fake}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.6-luna}"
      OPENAI_REASONING_EFFORT: "${OPENAI_REASONING_EFFORT:-medium}"
      DATABASE_URL: "sqlite:////data/demo.db"
    volumes:
      - demo-data:/data

volumes:
  demo-data:
